<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="container nav-container">
      <a href="/index.html" class="nav-brand"><i class="fas fa-book-open"></i><span>BookStore</span></a>
      <div class="nav-links" id="navLinks">
        <a href="/index.html" class="nav-link">Home</a>
        <a href="/books.html" class="nav-link">Books</a>
        <div id="authLinks" style="display:flex;align-items:center;gap:1.5rem"></div>
      </div>
      <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <main class="main-content">
    <div class="container book-detail-page">
      <nav class="breadcrumb">
        <a href="/index.html">Home</a> <i class="fas fa-chevron-right fa-xs"></i>
        <a href="/books.html">Books</a> <i class="fas fa-chevron-right fa-xs"></i>
        <span id="crumbTitle">Loading...</span>
      </nav>

      <div class="book-detail-grid" id="bookDetailContainer">
        <div style="grid-column: 1/-1;text-align:center;padding:5rem 0"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
      </div>

      <div class="related-section" id="relatedSection" style="display:none">
        <h2 class="section-title">You Might Also Like</h2>
        <div class="books-grid" id="relatedGrid"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-grid">
      <div class="footer-brand"><a href="/index.html" class="nav-brand" style="color:white"><i class="fas fa-book-open"></i> BookStore</a></div>
    </div>
    <div class="footer-bottom"><p>&copy; 2024 BookStore.</p></div>
  </footer>

  <div id="toast" class="toast"></div>

  <script src="/js/main.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const bookId = urlParams.get('id');

    if(!bookId) {
      document.getElementById('bookDetailContainer').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle empty-icon text-danger"></i><p>Book not found.</p><a href="/books.html" class="btn btn-primary">Go back</a></div>`;
    } else {
      fetch(`/api/books/${bookId}`)
        .then(res => res.json())
        .then(data => {
          if(!data.success) throw new Error();
          const b = data.book;
          document.title = `${b.title} — BookStore`;
          document.getElementById('crumbTitle').textContent = b.title;
          
          let ratingHtml = '';
          for(let i=1;i<=5;i++) ratingHtml += `<i class="fas fa-star ${i <= Math.round(b.rating) ? 'star-filled' : 'star-empty'}"></i>`;

          document.getElementById('bookDetailContainer').innerHTML = `
            <div class="book-detail-cover">
              <img src="${b.coverImage || '/images/default-book.png'}" alt="${b.title}" class="detail-img"/>
              ${b.featured ? '<div class="badge badge-featured badge-lg">⭐ Featured</div>' : ''}
            </div>
            <div class="book-detail-info">
              <span class="book-category book-category-lg">${b.category}</span>
              <h1 class="detail-title">${b.title}</h1>
              <p class="detail-author"><i class="fas fa-user-pen"></i> by <strong>${b.author}</strong></p>
              
              <div class="detail-rating">${ratingHtml} <span>${b.rating.toFixed(1)} (${b.numReviews} reviews)</span></div>
              
              <div class="detail-price-row">
                <span class="detail-price">$${b.price.toFixed(2)}</span>
                ${b.stock > 0 ? `<span class="stock-badge in-stock"><i class="fas fa-check-circle"></i> In Stock (${b.stock})</span>` : `<span class="stock-badge out-stock"><i class="fas fa-times-circle"></i> Out of Stock</span>`}
              </div>
              
              <p class="detail-description">${b.description}</p>
              
              <div class="detail-actions">
                ${b.stock > 0 ? `
                  <div class="qty-control">
                    <button class="qty-btn" id="qtyMinus"><i class="fas fa-minus"></i></button>
                    <span class="qty-value" id="qtyValue">1</span>
                    <button class="qty-btn" id="qtyPlus"><i class="fas fa-plus"></i></button>
                  </div>
                  <button class="btn btn-primary btn-lg add-to-cart-btn" id="addCartDetail"><i class="fas fa-cart-plus"></i> Add to Cart</button>
                ` : `<button class="btn btn-lg" disabled style="opacity:.5">Out of Stock</button>`}
              </div>
            </div>
          `;

          if(b.stock > 0) {
            let qty = 1;
            const qtyVal = document.getElementById('qtyValue');
            document.getElementById('qtyMinus').addEventListener('click', () => { if(qty>1){qty--;qtyVal.textContent=qty;} });
            document.getElementById('qtyPlus').addEventListener('click', () => { qty++;qtyVal.textContent=qty; });
            document.getElementById('addCartDetail').addEventListener('click', () => {
              window._addToCart(b._id, qty);
            });
          }

          // Fetch related books
          fetch(`/api/books?category=${encodeURIComponent(b.category)}&limit=5`)
            .then(res => res.json())
            .then(relData => {
              if(relData.success) {
                const related = relData.books.filter(rb => rb._id !== b._id).slice(0,4);
                if(related.length > 0) {
                  document.getElementById('relatedSection').style.display = 'block';
                  document.getElementById('relatedGrid').innerHTML = related.map(rb => `
                    <div class="book-card">
                      <a href="/book-detail.html?id=${rb._id}" class="book-card-img-link">
                        <img src="${rb.coverImage || '/images/default-book.png'}" class="book-card-img"/>
                      </a>
                      <div class="book-card-body">
                        <span class="book-category">${rb.category}</span>
                        <h3 class="book-title"><a href="/book-detail.html?id=${rb._id}">${rb.title}</a></h3>
                        <p class="book-author">${rb.author}</p>
                        <div class="book-card-footer">
                          <span class="book-price">$${rb.price.toFixed(2)}</span>
                        </div>
                      </div>
                    </div>
                  `).join('');
                }
              }
            });

        })
        .catch(() => {
          document.getElementById('bookDetailContainer').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle empty-icon text-danger"></i><p>Error loading book details.</p><a href="/books.html" class="btn btn-primary">Go back</a></div>`;
        });
    }
  </script>
</body>
</html>
