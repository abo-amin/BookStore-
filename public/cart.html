<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Cart — BookStore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="container nav-container">
      <a href="/index.html" class="nav-brand"><i class="fas fa-book-open"></i><span>BookStore</span></a>
      <div class="nav-links" id="navLinks">
        <a href="/index.html" class="nav-link">Home</a>
        <a href="/books.html" class="nav-link">Books</a>
        <div id="authLinks" style="display:flex;align-items:center;gap:1.5rem"></div>
      </div>
      <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <div class="container">
        <h1><i class="fas fa-shopping-cart"></i> My Cart</h1>
      </div>
    </div>

    <div class="container cart-page">
      <div id="cartContainer">
        <div style="text-align:center;padding:5rem 0"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
      </div>
    </div>
  </main>

  <!-- Checkout Modal -->
  <div class="modal-overlay hidden" id="checkoutModal">
    <div class="modal">
      <div class="modal-header">
        <h3><i class="fas fa-shipping-fast"></i> Shipping Details</h3>
        <button class="modal-close" onclick="document.getElementById('checkoutModal').classList.add('hidden')">&times;</button>
      </div>
      <form id="checkoutForm" class="auth-form">
        <div class="form-group">
          <label class="form-label">Street Address</label>
          <input type="text" id="shipAddress" class="form-input" placeholder="123 Main St" required/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">City</label>
            <input type="text" id="shipCity" class="form-input" placeholder="Cairo" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Postal Code</label>
            <input type="text" id="shipPostal" class="form-input" placeholder="12345" required/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Country</label>
          <input type="text" id="shipCountry" class="form-input" placeholder="Egypt" required/>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg">
          <i class="fas fa-check-circle"></i> Place Order
        </button>
      </form>
    </div>
  </div>

  <footer class="footer">
    <div class="container footer-grid">
      <div class="footer-brand"><a href="/index.html" class="nav-brand" style="color:white"><i class="fas fa-book-open"></i> BookStore</a></div>
    </div>
    <div class="footer-bottom"><p>&copy; 2024 BookStore.</p></div>
  </footer>

  <div id="toast" class="toast"></div>

  <script src="/js/main.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await checkAuthStatus();
      if (!user) {
        window.location.href = '/login.html';
        return;
      }
      loadCartPage();
    });

    async function loadCartPage() {
      try {
        const res = await fetch('/api/cart', { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
        const data = await res.json();
        
        const container = document.getElementById('cartContainer');
        
        if (data.success && data.items && data.items.length > 0) {
          container.innerHTML = `
            <div class="cart-layout">
              <div class="cart-items" id="cartItemsList">
                ${data.items.filter(i => i.book).map(item => `
                  <div class="cart-item" id="cartItem_${item.book._id}">
                    <img src="${item.book.coverImage || '/images/default-book.png'}" alt="${item.book.title}" class="cart-item-img"/>
                    <div class="cart-item-info">
                      <h3 class="cart-item-title"><a href="/book-detail.html?id=${item.book._id}">${item.book.title}</a></h3>
                      <p class="cart-item-author">${item.book.author}</p>
                      <span class="book-category">${item.book.category}</span>
                    </div>
                    <div class="cart-item-qty">
                      <button class="qty-btn" onclick="updateCartQty('${item.book._id}', ${item.quantity - 1})"><i class="fas fa-minus"></i></button>
                      <span class="qty-val" id="qty_${item.book._id}">${item.quantity}</span>
                      <button class="qty-btn" onclick="updateCartQty('${item.book._id}', ${item.quantity + 1})"><i class="fas fa-plus"></i></button>
                    </div>
                    <div class="cart-item-price" id="price_${item.book._id}">$${(item.book.price * item.quantity).toFixed(2)}</div>
                    <button class="btn-remove" onclick="removeCartItem('${item.book._id}')" title="Remove">
                      <i class="fas fa-trash-alt"></i>
                    </button>
                  </div>
                `).join('')}
              </div>
              <div class="cart-summary" id="cartSummary">
                <h3 class="summary-title">Order Summary</h3>
                <div class="summary-row">
                  <span>Items (<span id="summaryItems">${data.totalItems}</span>)</span>
                  <span id="summaryPrice">$${data.totalPrice.toFixed(2)}</span>
                </div>
                <div class="summary-row">
                  <span>Shipping</span><span class="text-success">Free</span>
                </div>
                <div class="summary-total">
                  <span>Total</span>
                  <span id="summaryTotal">$${data.totalPrice.toFixed(2)}</span>
                </div>
                <button class="btn btn-primary w-full btn-lg" id="checkoutBtn" onclick="checkout()">
                  <i class="fas fa-lock"></i> Proceed to Checkout
                </button>
                <a href="/books.html" class="btn btn-outline w-full" style="margin-top:.75rem;display:block;text-align:center">Continue Shopping</a>
                <button class="btn btn-sm text-danger" style="width:100%;margin-top:.5rem;background:transparent;border:1px solid #ff4d6d" onclick="clearCart()">
                  <i class="fas fa-trash"></i> Clear Cart
                </button>
              </div>
            </div>
          `;
        } else {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-shopping-cart empty-icon"></i>
              <h2>Your cart is empty</h2>
              <p>Looks like you haven't added any books yet.</p>
              <a href="/books.html" class="btn btn-primary btn-lg">Browse Books</a>
            </div>
          `;
        }
      } catch (err) {
        document.getElementById('cartContainer').innerHTML = '<p class="text-danger text-center">Failed to load cart.</p>';
      }
    }

    window.checkout = function() { document.getElementById('checkoutModal').classList.remove('hidden'); }
    
    document.getElementById('checkoutForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
          body: JSON.stringify({ shippingAddress: { address: document.getElementById('shipAddress').value, city: document.getElementById('shipCity').value, postalCode: document.getElementById('shipPostal').value, country: document.getElementById('shipCountry').value } })
        });
        const data = await res.json();
        if (data.success) { window.showToast('Order placed successfully!', 'success'); setTimeout(() => location.href='/profile.html', 1500); }
        else window.showToast(data.message, 'error');
      } catch(err) { window.showToast('Checkout failed', 'error'); }
    });
    
    window.updateCartQty = async function(bookId, qty) {
      if (qty < 1) return removeCartItem(bookId);
      const res = await fetch('/api/cart/'+bookId, { method:'PUT', headers:{'Content-Type':'application/json','X-Requested-With':'XMLHttpRequest'}, body: JSON.stringify({quantity:qty}) });
      const data = await res.json();
      if(data.success){ 
        document.getElementById('qty_'+bookId).textContent=qty; 
        // We'd ideally need the book price to update the individual item total, but we'll reload the cart for simplicity
        loadCartPage();
        window._updateCartBadge(data.totalItems); 
      }
    }
    
    window.removeCartItem = async function(bookId) {
      const res = await fetch('/api/cart/'+bookId, { method:'DELETE', headers:{'X-Requested-With':'XMLHttpRequest'} });
      const data = await res.json();
      if(data.success){ 
        window.showToast('Item removed','success'); 
        window._updateCartBadge(data.totalItems); 
        loadCartPage();
      }
    }
    
    window.clearCart = async function() {
      const res = await fetch('/api/cart/clear', { method:'DELETE', headers:{'X-Requested-With':'XMLHttpRequest'} });
      const data = await res.json();
      if(data.success){ 
        window.showToast('Cart cleared','success'); 
        window._updateCartBadge(0);
        loadCartPage(); 
      }
    }
  </script>
</body>
</html>
