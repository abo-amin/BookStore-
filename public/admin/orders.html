<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Orders — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <div class="admin-page">
    <aside class="admin-sidebar">
      <div class="admin-brand"><i class="fas fa-book-open"></i> Admin</div>
      <nav class="admin-nav">
        <a href="/admin/dashboard.html" class="admin-nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="/admin/books.html" class="admin-nav-link"><i class="fas fa-book"></i> Books</a>
        <a href="/admin/orders.html" class="admin-nav-link active"><i class="fas fa-shopping-bag"></i> Orders</a>
        <a href="/" class="admin-nav-link" style="margin-top:2rem"><i class="fas fa-external-link-alt"></i> View Site</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <div><h1>Manage Orders</h1></div>
      </div>
      
      <div class="admin-section">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead><tr><th>Order ID</th><th>User</th><th>Date</th><th>Total</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="ordersTbody">
              <tr><td colspan="6" style="text-align:center"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/js/main.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await checkAuthStatus();
      if (!user || user.role !== 'admin') return window.location.href = '/login.html';
      loadAdminOrders();
    });

    async function loadAdminOrders() {
      const res = await fetch('/api/orders/admin');
      const data = await res.json();
      if (data.success) {
        document.getElementById('ordersTbody').innerHTML = data.orders.map(o => `
          <tr>
            <td><strong>#${o._id.toString().slice(-8).toUpperCase()}</strong></td>
            <td>${o.user ? o.user.name : 'Unknown'}<br><small class="text-muted">${o.user ? o.user.email : ''}</small></td>
            <td>${new Date(o.createdAt).toLocaleDateString()}</td>
            <td><strong>$${o.totalPrice.toFixed(2)}</strong></td>
            <td><span class="status-badge status-${o.status}" id="badge_${o._id}">${o.status}</span></td>
            <td>
              <select class="select-input" onchange="updateStatus('${o._id}', this.value)" style="padding:0.4rem;font-size:0.9rem">
                <option value="pending" ${o.status==='pending'?'selected':''}>Pending</option>
                <option value="processing" ${o.status==='processing'?'selected':''}>Processing</option>
                <option value="shipped" ${o.status==='shipped'?'selected':''}>Shipped</option>
                <option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option>
                <option value="cancelled" ${o.status==='cancelled'?'selected':''}>Cancelled</option>
              </select>
            </td>
          </tr>
        `).join('');
      }
    }

    async function updateStatus(id, status) {
      const res = await fetch('/api/orders/'+id+'/status', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status}) });
      const data = await res.json();
      if(data.success) {
        window.showToast('Status updated', 'success');
        const badge = document.getElementById('badge_'+id);
        badge.className = 'status-badge status-'+status;
        badge.textContent = status;
      } else { window.showToast('Update failed', 'error'); }
    }
  </script>
</body>
</html>
