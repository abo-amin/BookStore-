<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <div class="admin-page">
    <aside class="admin-sidebar">
      <div class="admin-brand"><i class="fas fa-book-open"></i> Admin</div>
      <nav class="admin-nav">
        <a href="/admin/dashboard.html" class="admin-nav-link active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="/admin/books.html" class="admin-nav-link"><i class="fas fa-book"></i> Books</a>
        <a href="/admin/orders.html" class="admin-nav-link"><i class="fas fa-shopping-bag"></i> Orders</a>
        <a href="/" class="admin-nav-link" style="margin-top:2rem"><i class="fas fa-external-link-alt"></i> View Site</a>
        <button onclick="logout()" class="admin-nav-link text-danger" style="background:transparent;border:none;width:100%;text-align:left;cursor:pointer"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <div><h1>Dashboard</h1><p class="admin-greeting">Welcome back, <span id="adminName">Admin</span> 👋</p></div>
      </div>
      <div id="statsGrid" class="stats-grid">
        <div style="grid-column:1/-1;text-align:center"><i class="fas fa-spinner fa-spin"></i> Loading stats...</div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/js/main.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await checkAuthStatus();
      if (!user || user.role !== 'admin') return window.location.href = '/login.html';
      document.getElementById('adminName').textContent = user.name.split(' ')[0];

      fetch('/api/books/admin/stats')
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            const { totalBooks, totalUsers, totalOrders, totalRevenue } = data.data;
            document.getElementById('statsGrid').innerHTML = `
              <div class="stat-card stat-books"><div class="stat-icon"><i class="fas fa-book"></i></div><div class="stat-info"><span class="stat-value">${totalBooks}</span><span class="stat-label">Total Books</span></div></div>
              <div class="stat-card stat-users"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-info"><span class="stat-value">${totalUsers}</span><span class="stat-label">Registered Users</span></div></div>
              <div class="stat-card stat-orders"><div class="stat-icon"><i class="fas fa-shopping-bag"></i></div><div class="stat-info"><span class="stat-value">${totalOrders}</span><span class="stat-label">Total Orders</span></div></div>
              <div class="stat-card stat-revenue"><div class="stat-icon"><i class="fas fa-dollar-sign"></i></div><div class="stat-info"><span class="stat-value">$${totalRevenue.toFixed(2)}</span><span class="stat-label">Total Revenue</span></div></div>
            `;
          }
        });
    });
  </script>
</body>
</html>
