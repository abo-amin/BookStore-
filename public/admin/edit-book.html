<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Book — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <div class="admin-page">
    <aside class="admin-sidebar">
      <div class="admin-brand"><i class="fas fa-book-open"></i> Admin</div>
      <nav class="admin-nav">
        <a href="/admin/dashboard.html" class="admin-nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="/admin/books.html" class="admin-nav-link active"><i class="fas fa-book"></i> Books</a>
        <a href="/admin/orders.html" class="admin-nav-link"><i class="fas fa-shopping-bag"></i> Orders</a>
        <a href="/" class="admin-nav-link" style="margin-top:2rem"><i class="fas fa-external-link-alt"></i> View Site</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <div><h1>Edit Book</h1></div>
        <a href="/admin/books.html" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back to Books</a>
      </div>
      
      <div class="admin-form-card">
        <form id="editBookForm" class="auth-form">
          <div class="form-row">
            <div class="form-group"><label class="form-label">Title</label><input type="text" id="bTitle" class="form-input" required/></div>
            <div class="form-group"><label class="form-label">Author</label><input type="text" id="bAuthor" class="form-input" required/></div>
          </div>
          <div class="form-group"><label class="form-label">Description</label><textarea id="bDesc" class="form-input form-textarea" required></textarea></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Category</label><input type="text" id="bCat" class="form-input" required/></div>
            <div class="form-group"><label class="form-label">Price</label><input type="number" id="bPrice" class="form-input" step="0.01" required/></div>
            <div class="form-group"><label class="form-label">Stock</label><input type="number" id="bStock" class="form-input" required/></div>
          </div>
          <div class="form-group"><label class="form-label">Cover Image URL</label><input type="url" id="bImage" class="form-input"/></div>
          <div class="form-group">
            <label class="toggle-label"><input type="checkbox" id="bFeatured"/><span class="toggle-slider"></span> Featured Book</label>
          </div>
          <button type="submit" class="btn btn-primary w-full btn-lg">Update Book</button>
        </form>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/js/main.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    const bookId = new URLSearchParams(window.location.search).get('id');
    
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await checkAuthStatus();
      if (!user || user.role !== 'admin') return window.location.href = '/login.html';
      if (!bookId) return window.location.href = '/admin/books.html';

      // Fetch book details
      const res = await fetch('/api/books/' + bookId);
      const data = await res.json();
      if(data.success) {
        document.getElementById('bTitle').value = data.book.title;
        document.getElementById('bAuthor').value = data.book.author;
        document.getElementById('bDesc').value = data.book.description;
        document.getElementById('bCat').value = data.book.category;
        document.getElementById('bPrice').value = data.book.price;
        document.getElementById('bStock').value = data.book.stock;
        document.getElementById('bImage').value = data.book.coverImage || '';
        document.getElementById('bFeatured').checked = data.book.featured;
      }
    });

    document.getElementById('editBookForm').addEventListener('submit', async(e) => {
      e.preventDefault();
      const body = {
        title: document.getElementById('bTitle').value,
        author: document.getElementById('bAuthor').value,
        description: document.getElementById('bDesc').value,
        category: document.getElementById('bCat').value,
        price: parseFloat(document.getElementById('bPrice').value),
        stock: parseInt(document.getElementById('bStock').value),
        coverImage: document.getElementById('bImage').value,
        featured: document.getElementById('bFeatured').checked
      };
      const res = await fetch('/api/books/' + bookId, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      const data = await res.json();
      if(data.success){ 
        window.showToast('Book updated!', 'success');
        setTimeout(()=>location.href='/admin/books.html', 1000);
      } else { window.showToast(data.message, 'error'); }
    });
  </script>
</body>
</html>
