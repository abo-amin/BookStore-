<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Books — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <div class="admin-page">
    <aside class="admin-sidebar">
      <div class="admin-brand"><i class="fas fa-book-open"></i> Admin</div>
      <nav class="admin-nav">
        <a href="/admin/dashboard.html" class="admin-nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="/admin/books.html" class="admin-nav-link active"><i class="fas fa-book"></i> Books</a>
        <a href="/admin/orders.html" class="admin-nav-link"><i class="fas fa-shopping-bag"></i> Orders</a>
        <a href="/" class="admin-nav-link" style="margin-top:2rem"><i class="fas fa-external-link-alt"></i> View Site</a>
        <button onclick="logout()" class="admin-nav-link text-danger" style="background:transparent;border:none;width:100%;text-align:left;cursor:pointer"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <div><h1>Manage Books</h1></div>
        <a href="/admin/add-book.html" class="btn btn-primary"><i class="fas fa-plus"></i> Add New Book</a>
      </div>
      
      <div class="admin-section">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead><tr><th>Book</th><th>Title & Author</th><th>Category</th><th>Price</th><th>Stock</th><th>Featured</th><th>Actions</th></tr></thead>
            <tbody id="booksTbody">
              <tr><td colspan="7" style="text-align:center"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/js/main.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await checkAuthStatus();
      if (!user || user.role !== 'admin') return window.location.href = '/login.html';
      loadAdminBooks();
    });

    async function loadAdminBooks() {
      const res = await fetch('/api/books?limit=100');
      const data = await res.json();
      if (data.success) {
        document.getElementById('booksTbody').innerHTML = data.books.map(b => `
          <tr id="row_${b._id}">
            <td><img src="${b.coverImage||'/images/default-book.png'}" class="admin-book-thumb"/></td>
            <td><strong>${b.title}</strong><br><small class="text-muted">${b.author}</small></td>
            <td><span class="badge badge-user">${b.category}</span></td>
            <td>$${b.price.toFixed(2)}</td>
            <td>${b.stock > 0 ? b.stock : '<span class="text-danger">Out of Stock</span>'}</td>
            <td>
              <label class="toggle-label">
                <input type="checkbox" onchange="toggleFeatured('${b._id}', this.checked)" ${b.featured ? 'checked' : ''}>
                <span class="toggle-slider"></span>
              </label>
            </td>
            <td>
              <div class="table-actions">
                <a href="/admin/edit-book.html?id=${b._id}" class="btn btn-sm btn-outline"><i class="fas fa-edit"></i></a>
                <button class="btn btn-sm btn-outline" onclick="deleteBook('${b._id}')"><i class="fas fa-trash text-danger"></i></button>
              </div>
            </td>
          </tr>
        `).join('');
      }
    }

    async function toggleFeatured(id, isFeatured) {
      const res = await fetch('/api/books/'+id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({featured:isFeatured}) });
      const data = await res.json();
      window.showToast(data.message, data.success?'success':'error');
    }

    async function deleteBook(id) {
      if(!confirm('Are you sure you want to delete this book?')) return;
      const res = await fetch('/api/books/'+id, { method:'DELETE' });
      const data = await res.json();
      if(data.success) {
        window.showToast('Book deleted', 'success');
        document.getElementById('row_'+id).remove();
      } else { window.showToast('Failed to delete', 'error'); }
    }
  </script>
</body>
</html>
