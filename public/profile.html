<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile — BookStore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="container nav-container">
      <a href="/index.html" class="nav-brand"><i class="fas fa-book-open"></i><span>BookStore</span></a>
      <div class="nav-links" id="navLinks">
        <a href="/index.html" class="nav-link">Home</a>
        <a href="/books.html" class="nav-link">Books</a>
        <div id="authLinks" style="display:flex;align-items:center;gap:1.5rem"></div>
      </div>
      <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <div class="container">
        <h1><i class="fas fa-user-circle"></i> My Profile</h1>
      </div>
    </div>

    <div class="container profile-page">
      <div class="profile-grid" id="profileGrid" style="display:none">
        <!-- Profile Info Card -->
        <div class="profile-card" id="profileCard">
          <div style="text-align:center;padding:3rem 0"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
        </div>

        <!-- Orders -->
        <div class="orders-section">
          <h2 class="section-title">My Orders (<span id="ordersCount">0</span>)</h2>
          <div id="ordersContainer">
            <div style="text-align:center;padding:3rem 0"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-grid">
      <div class="footer-brand"><a href="/index.html" class="nav-brand" style="color:white"><i class="fas fa-book-open"></i> BookStore</a></div>
    </div>
    <div class="footer-bottom"><p>&copy; 2024 BookStore.</p></div>
  </footer>

  <div id="toast" class="toast"></div>

  <script src="/js/main.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await checkAuthStatus();
      if (!user) {
        window.location.href = '/login.html';
        return;
      }
      
      document.getElementById('profileGrid').style.display = 'grid';

      // Render profile card
      document.getElementById('profileCard').innerHTML = `
        <div class="profile-avatar"><i class="fas fa-user-circle"></i></div>
        <h2 class="profile-name">${user.name}</h2>
        <p class="profile-email">${user.email}</p>
        <span class="badge ${user.role === 'admin' ? 'badge-admin' : 'badge-user'}">${user.role === 'admin' ? '👑 Admin' : '📚 Reader'}</span>
        <p class="profile-since">Member since ${new Date(user.createdAt).toLocaleDateString('en-US',{year:'numeric',month:'long'})}</p>

        <form id="profileForm" class="auth-form profile-form">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" id="profileName" class="form-input" value="${user.name}" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="profileEmail" class="form-input" value="${user.email}" required/>
          </div>
          <button type="submit" class="btn btn-primary w-full">Update Profile</button>
        </form>

        <form id="passwordForm" class="auth-form profile-form" style="margin-top:1.5rem">
          <h4 style="margin-bottom:1rem;color:var(--text-secondary)">Change Password</h4>
          <div class="form-group">
            <label class="form-label">Current Password</label>
            <input type="password" id="currPass" class="form-input" placeholder="••••••••"/>
          </div>
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input type="password" id="newPass" class="form-input" placeholder="••••••••"/>
          </div>
          <button type="submit" class="btn btn-outline w-full">Change Password</button>
        </form>
      `;

      // Setup forms
      document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const res = await fetch('/api/auth/profile', { method:'PUT', headers:{'Content-Type':'application/json','X-Requested-With':'XMLHttpRequest'}, body: JSON.stringify({ name: document.getElementById('profileName').value, email: document.getElementById('profileEmail').value }) });
        const data = await res.json();
        window.showToast(data.message, data.success ? 'success' : 'error');
        if(data.success) checkAuthStatus(); // Update navbar
      });
      document.getElementById('passwordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const res = await fetch('/api/auth/password', { method:'PUT', headers:{'Content-Type':'application/json','X-Requested-With':'XMLHttpRequest'}, body: JSON.stringify({ currentPassword: document.getElementById('currPass').value, newPassword: document.getElementById('newPass').value }) });
        const data = await res.json();
        window.showToast(data.message, data.success ? 'success' : 'error');
        if(data.success){ document.getElementById('currPass').value=''; document.getElementById('newPass').value=''; }
      });

      // Load orders
      try {
        const res = await fetch('/api/orders', { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
        const data = await res.json();
        if (data.success) {
          const orders = data.orders;
          document.getElementById('ordersCount').textContent = orders.length;
          const container = document.getElementById('ordersContainer');
          
          if (orders.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-box-open empty-icon"></i><p>No orders yet. <a href="/books.html">Start shopping!</a></p></div>`;
          } else {
            container.innerHTML = orders.map(order => `
              <div class="order-card">
                <div class="order-header">
                  <div>
                    <span class="order-id">Order #${order._id.toString().slice(-8).toUpperCase()}</span>
                    <span class="order-date">${new Date(order.createdAt).toLocaleDateString()}</span>
                  </div>
                  <span class="status-badge status-${order.status}">${order.status}</span>
                </div>
                <div class="order-items-preview">
                  ${order.items.slice(0,3).map(item => `
                    <div class="order-item-row">
                      <span>${item.title}</span>
                      <span>x${item.quantity}</span>
                      <span>$${(item.price * item.quantity).toFixed(2)}</span>
                    </div>
                  `).join('')}
                  ${order.items.length > 3 ? `<small style="color:var(--text-muted)">+${order.items.length-3} more items</small>` : ''}
                </div>
                <div class="order-total">Total: <strong>$${order.totalPrice.toFixed(2)}</strong></div>
              </div>
            `).join('');
          }
        }
      } catch (err) {
        console.error(err);
        document.getElementById('ordersContainer').innerHTML = '<p class="text-danger">Failed to load orders.</p>';
      }
    });
  </script>
</body>
</html>
